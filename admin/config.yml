backend:
  name: git-gateway
  repo: Nature-Hungry/wildsingapore-jekyll
  branch: main

publish_mode: editorial_workflow

local_backend: true
search: false
media_folder: "assets/uploads" # Where media files will be saved
public_folder: "https://f003.backblazeb2.com/file/naturehungry/" # Where Jekyll will look for them

collections:
  - name: "entries"
    label: "Species Factsheets"
    folder: "_entries"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    nested:
      depth: 6 
    
    
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "string"}
      - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
      - {label: "Body", name: "body", widget: "markdown"}
