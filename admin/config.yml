backend:
  name: github
  repo: nature-hungry/nature-hungry.github.io # Path to your GitHub repository
  branch: main # or master, depending on your default branch

media_folder: "assets/images/uploads" # Where media files will be saved
public_folder: "https://f003.backblazeb2.com/file/naturehungry/" # Where Jekyll will look for them

collections:
  - name: "entries"
    label: "Entries"
    folder: "_entries"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }