name: Deploy Jekyll to Org Root

on:
  push:
    branches:
      - main 

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.22' # Specify your required Ruby version
          bundler-cache: true # Runs 'bundle install' and caches gems automatically

      - name: Build Jekyll site
        run: |
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to Organization Root Repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_ACCESS_TOKEN }}
          repository-name: Wild-Singapore/wild-singapore.github.io # Replace with your actual org/repo name
          branch: web # The target branch in your root repo
          folder: _site # The folder Jekyll outputs to
          clean: true # Automatically remove old files in the target repo
