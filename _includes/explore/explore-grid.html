<style>
 .entries-grid{
    display: grid;
    grid-template-columns: repeat(5, minmax(100px, 1fr));
    gap:1rem;
}

.entry{
    height:fit-content;
    position: relative;
    
}
.entry .img-container{
    width:100%;
    aspect-ratio: 4/3;
}
.entry .img-container img{
    width: 100%;
    height:100%;
    object-fit: cover;
}

.scientific-name{
    font-size: 0.6rem;
}

</style>
  
  <div id="entries-grid" class="entries-grid">
    
    
    
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script defer>
let fuse
let data = []
let results = []

// Read URL params on page load
const params = new URLSearchParams(window.location.search)

const initialQuery = params.get('q') || ''

let currentPage = parseInt(params.get('page'), 10)
if (isNaN(currentPage) || currentPage < 1) {
  currentPage = 1
}

const perpage = 10

fetch('/assets//search.json')
  .then(res => res.json())
  .then(json => {
    data = json

    fuse = new Fuse(data, {
      includeScore: true,
      threshold: 0.01, // lower = stricter, higher = more fuzzy
      minMatchCharLength: 4,
      ignoreLocation: false,
    findAllMatches: false,
      keys: [
        { name: "title", weight: 3 },
        { name: "species", weight: 3 },
        { name: "genus", weight: 2 },
        { name: "family", weight: 2 },
        { name: "keywords", weight: 2 },
        { name: "summary", weight: 1 },
        { name: "search_text", weight: 0.5 } // fallback for partial strings
      ]
    })

    results = json

    renderResults()

  })


const input = document.getElementById('search-input')
const resultsDiv = document.getElementById('entries-grid')
const pageInfo = document.getElementById('page-info')
const prevBtn = document.getElementById('prev')
const nextBtn = document.getElementById('next')
let query = ""

input.value = initialQuery


input.addEventListener('input', () => {
  query = input.value.trim().toLowerCase()

  currentPage = 1

  updateURL()

  if (!query) {
    results = data
    renderResults()

    return
  }
  // Step 1: true substring search for partial matches
  let partialResults = data.filter(item =>
    item.search_text.includes(query)
  )

  // Step 2: Fuse.js ranking
  const fuseResults = fuse.search(query).map(r => r.item)

  // Merge results, remove duplicates
  const combined = [...new Set([...fuseResults, ...partialResults])]
    results = combined
  renderResults()
})


prevBtn.addEventListener('click', () => {
  if (currentPage > 1) {
    currentPage--
    updateURL()
    renderResults()
  }
})

nextBtn.addEventListener('click', () => {
  const totalPages = Math.ceil(results.length / perpage)

  if (currentPage < totalPages) {
    currentPage++
    updateURL()
    renderResults()
  }
})


function renderResults() {
    console.log("rendering entries")
    const start = (currentPage - 1) * perpage
    const end = start + perpage

    const paginated = results.slice(start, end)
    if (paginated.length === 0) {
        resultsDiv.innerHTML = '<p>No results found</p>'
        return
    }

  resultsDiv.innerHTML = paginated.map(item => `
    <div class="entry">
        <div class="img-container">
            <img src="${item.coverimg ?? 'https://placehold.co/600x400/png'}" alt="">
        </div>
        <h4>${item.title}</h4>
        <p class="scientific-name">${item.genus} ${item.species}</p>
    </div>
  `).join('')

  const totalPages = Math.ceil(results.length / perpage)

  pageInfo.textContent = `Page ${currentPage} of ${totalPages || 1}`

  prevBtn.disabled = currentPage === 1
  nextBtn.disabled = currentPage >= totalPages
}

function updateURL() {

  const params = new URLSearchParams()

  if (query) {
    params.set('q', query)
  }

  if (currentPage > 0) {
    params.set('page', currentPage)
  }

  const newURL =
    `${window.location.pathname}?${params.toString()}`

  history.replaceState({}, '', newURL)
}


</script>
