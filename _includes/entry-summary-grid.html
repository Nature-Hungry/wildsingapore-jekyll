{% assign items = include.items %}

<div class="entry-summary-grid">
{% for entry in items %}
<div class="entry-summary-grid-item">
  <div class="img-container">
      <img src="{{entry.coverimg}}" />
  </div>
  <div>
    <h2><a href="{{ entry.url | relative_url }}">{{entry.title}}</a></h2>
    <p class="scientific-name-subtitle">{{entry.genus}} {{entry.species}}</p>
    <p>
      {{entry.summary}}
    </p>
  </div>
</div>
{% endfor %}
</div>
