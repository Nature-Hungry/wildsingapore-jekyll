# Site Settings
title: "Nature Hungry"
tagline: "Fully Open Source, Free Forever."
description: "One-stop resource for nature lovers in Singapore. We are a group of volunteers who are passionate about sharing information on Singapore's biodiversity."
url: "https://nature-hungry.github.io"
baseurl: ""

# Dependencies
markdown:         kramdown
highlighter:      rouge    # Pygments is largely deprecated; Rouge is the Jekyll 4 standard

# Custom vars
version:          2.1.0

# Backblaze Assets Directly
b2_url: "https://images.naturehungry.sg/"

github:
  repo:           https://github.com/Nature-Hungry/nature-hungry.github.io
  username:       Nature-Hungry

# Replace this value and uncomment to enable Google Analytics tracking
google_analytics: G-D6D1VPY6W2

collections:
  entries:
    output: true
    permalink: /:collection/:path/
  photoindexes:
    output: true
    permalink: /:collection/:path/
  articles:
    output: true
    permalink: /:collection/:path/
  forteachers:
    output: true
    permalink: /forteachers/:name/
    sort_by: date
  forguides:
    output: true
    permalink: /forguides/:name/
  forindividuals:
    output: true
    permalink: /forindividuals/:name/
  contributors:
    output: true
    permalink: /contributors/:name/

pagination:
  enabled: true
  per_page: 5
  sort_field: "date"
  sort_reverse: true
  permalink: "/forteachers/page/:num/"
  title_suffix: " — Page :num"

pagination:
  enabled: true
  per_page: 5
  sort_field: "date"
  sort_reverse: true
  permalink: "/forindividuals/page/:num/"
  title_suffix: " — Page :num"

pagination:
  enabled: true
  per_page: 5
  sort_field: "date"
  sort_reverse: true
  permalink: "/forguides/page/:num/"
  title_suffix: " — Page :num"

pagination:
  enabled: true
  per_page: 5
  sort_field: "date"
  sort_reverse: true
  permalink: "/contributors/page/:num/"
  title_suffix: " — Page :num"

include: [admin]
exclude:
- "*.py"

media_library:
  name: backblaze-b2
  config:
    bucket: ${{ secrets.B2_BUCKET }}