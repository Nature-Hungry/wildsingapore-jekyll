    <script>
        document.addEventListener("DOMContentLoaded", () => {
        const navContainer = document.getElementById("section-nav");
    const headings = document.querySelectorAll("#main-content h2, #main-content h3");
  
  // 1. Setup the List Container
  const ul = document.createElement("ul");

  // 2. Loop through sections to build sidebar menu items
  headings.forEach((heading) => {
    if (!heading) return; // Skip section if no H2 exists
    if (!heading.hasAttribute("id")) return;
    

    // Create list item components
    const li = document.createElement("li");
    const a = document.createElement("a");
    
    a.href = `#${heading.id}`;
    if(heading.hasAttribute("label")){
      a.textContent = heading.getAttribute('label')
    }else{
      a.textContent = heading.textContent;
    }
    a.classList.add("nav-link");

    // Assemble and attach elements
    li.appendChild(a);
    ul.appendChild(li);
  });

  // Inject generated list into the DOM sidebar
  navContainer.appendChild(ul);

  // 3. Active state tracking with IntersectionObserver
  const navLinks = document.querySelectorAll("#section-nav .nav-link");
  const options = {
    root: null,
    rootMargin: "-20% 0px -60% 0px", // Optimizes trigger point near top-middle viewport
    threshold: 0
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        const id = entry.target.getAttribute("id");
        
        // Clear active class from previous items
        navLinks.forEach((link) => link.classList.remove("active"));
        
        // Target and highlight matching anchor tag
        const activeLink = document.querySelector(`#section-nav a[href="#${id}"]`);
        if (activeLink) activeLink.classList.add("active");
      }
    });
  }, options);

  // Start observing all structural page sections
  headings.forEach((h) => observer.observe(h));
});
    </script>
